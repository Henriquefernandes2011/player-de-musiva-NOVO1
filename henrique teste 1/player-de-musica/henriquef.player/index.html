<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de música henrique</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="player-section"> 
            <div class="vinil">
                <div class="album-art"></div>
            </div>
            <div class="current-song">Selecione uma música</div>

            <div class="controls">
                <button class="backward">⏮️</button>
                <button class="play-pause">⏯️</button>
                <button class="forward">⏭️</button>
            </div>
        </div>
          <div class="playlist-section">
            <h1 class="titulo-playlist">Playlist</h1>
            <div class="playlist"></div>
        </div>
    </div>
</body>
</html>
